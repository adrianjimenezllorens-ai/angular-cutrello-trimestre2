<div class="border-t pt-6">
  <h3 class="text-lg font-semibold text-gray-800 mb-4">Comentarios</h3>

  <form class="mb-6" (submit)="addComment($event)">
    <textarea
      rows="3"
      class="block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"
      placeholder="Escribe un comentario..."
      [formField]="commentForm.comment"
    ></textarea>

    @for (error of commentForm.comment().errors(); track error.kind) {
      <div class="text-xs mt-1 text-red-700">{{ error.message }}</div>
    }

    <div class="mt-2 flex justify-end">
      <button
        type="submit"
        class="bg-indigo-600 text-white py-2 px-4 rounded-md hover:bg-indigo-700 disabled:bg-slate-400 disabled:cursor-not-allowed"
        [disabled]="commentForm().invalid()"
      >
        Comentar
      </button>
    </div>
  </form>

  <div class="space-y-4">
    @for (comment of comments(); track comment.id) {
      <comment-item [comment]="comment"></comment-item>
    }
  </div>

  @if (hasNextPage()) {
    <button
      type="button"
      class="mt-6 w-full text-center bg-gray-100 text-gray-700 font-semibold py-2 px-4 rounded-md hover:bg-gray-200"
      (click)="loadMoreComments()"
      [disabled]="isLoading()"
    >
      Cargar más comentarios
    </button>
  }
</div>
