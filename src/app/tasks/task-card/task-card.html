<div class="p-4 rounded-lg shadow border border-gray-300/50 bg-white/50 relative">
  <h4 class="font-bold text-lg text-gray-600">
    <a [routerLink]="['/tasks', task().id]" class="title">{{ task().title }}</a>

    <button
      type="button"
      class="float-end rounded-full text-red-700 bg-transparent p-1 border-2 border-red-700/50 hover:bg-red-700 hover:text-white transition-colors duration-300 delete-btn"
      (click)="deleteTask()"
    >
      X
    </button>
  </h4>

  <p class="text-sm text-gray-500 mt-2 deadLine">
    Fecha límite: {{ task().deadLine | date: 'dd/MM/yyyy' }}
  </p>

  <div class="mt-3">
    <label
      [for]="'status-' + task().id"
      class="block text-xs font-semibold text-gray-600 mb-1"
    >
      Estado
    </label>

    <select
      [id]="'status-' + task().id"
      class="w-full rounded-md border border-gray-300 bg-white px-3 py-2 text-sm shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
      [value]="status()"
      (change)="onStatusSelectChange($event)"
    >
      <option value="0">Pendiente</option>
      <option value="1">En Proceso</option>
      <option value="2">Terminada</option>
    </select>
  </div>
</div>
