<div class="border-t pt-6">
  <h3 class="text-lg font-semibold text-gray-800 mb-4">Subtareas</h3>

  <div class="space-y-2">
    @for (subtask of subtasks(); track subtask.id) {
      <subtask-item
        [taskId]="taskId()"
        [subtask]="subtask"
        (deleted)="removeSubtask(subtask)"
      ></subtask-item>
    }
  </div>

  <form class="mt-4 flex gap-2" (submit)="addSubtask($event)">
    <input
      type="text"
      placeholder="Añadir nueva subtarea..."
      class="grow mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"
      [formField]="newSubtaskForm.description"
    />

    <button
      type="submit"
      class="bg-indigo-500 text-white py-2 px-4 rounded-md hover:bg-indigo-600"
      [disabled]="newSubtaskForm().invalid()"
    >
      Añadir
    </button>
  </form>

  @for (error of newSubtaskForm.description().errors(); track error.kind) {
    <div class="text-xs mt-1 text-red-700">{{ error.message }}</div>
  }
</div>
