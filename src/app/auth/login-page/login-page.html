<div class="w-full m-auto max-w-xl">
  <form class="bg-white p-8 rounded-lg shadow-md" (submit)="login($event)">
    <h2 class="text-2xl font-bold text-gray-800 mb-8 text-center">Log in</h2>

    <div class="mb-6">
      <label for="email" class="block text-gray-700 font-bold mb-2">Email</label>
      <input
        type="email"
        id="email"
        class="w-full px-3 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
        placeholder="tu.email@ejemplo.com"
        [formField]="loginForm.email"
      />
      @for (error of loginForm.email().errors(); track error.kind) {
        <div class="text-xs mt-1 text-red-700">{{ error.message }}</div>
      }
    </div>

    <div class="mb-6">
      <label for="password" class="block text-gray-700 font-bold mb-2">Contraseña</label>
      <input
        type="password"
        id="password"
        class="w-full px-3 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
        placeholder="••••••••"
        [formField]="loginForm.password"
      />
      @for (error of loginForm.password().errors(); track error.kind) {
        <div class="text-xs mt-1 text-red-700">{{ error.message }}</div>
      }
    </div>

    @if (errorMessage()) {
      <div class="mb-4 rounded-lg bg-red-100 px-4 py-3 text-sm text-red-700">
        {{ errorMessage() }}
      </div>
    }

    <div>
      <button
        type="submit"
        class="w-full bg-blue-500 text-white font-bold py-3 px-4 rounded-lg hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50 disabled:bg-slate-400 disabled:cursor-not-allowed"
        [disabled]="loginForm().invalid()"
      >
        Login
      </button>
    </div>

    <div class="mt-6 flex justify-center">
      <div googleLogin (login)="loggedGoogle($event)"></div>
    </div>

    <div class="mt-4 flex justify-center">
      <button
        type="button"
        fbLogin
        [scopes]="['email', 'public_profile']"
        class="bg-blue-700 text-white font-bold py-3 px-4 rounded-lg hover:bg-blue-800"
        (loginOk)="loggedFacebook($event)"
        (loginError)="showFacebookError($event)"
      >
        Login con Facebook
      </button>
    </div>

    <div class="mt-6 text-center">
      <p class="text-sm text-gray-600">
        ¿No tienes cuenta todavía?
        <a [routerLink]="['/auth/register']" class="font-medium text-blue-600 hover:text-blue-500">
          Regístrate aquí
        </a>
      </p>
    </div>
  </form>
</div>
